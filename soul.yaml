# Soul v0.3 Configuration

core:
  host: "127.0.0.1"
  port: 8765

pipeline:
  # Default processing chain for user.message events
  user.message:
    steps: ["perception", "memory", "reasoning", "action"]
    step_timeout_ms: 10000
    skip_on_error: true

  # For mode.set, only reasoning is needed
  mode.set:
    steps: ["reasoning", "action"]
    step_timeout_ms: 5000

nodes:
  reasoning:
    model: "qwen2.5:3b"
    base_url: "http://localhost:11434"
  memory:
    db_path: "data/memory.db"
    max_recent_utterances: 30
  perception:
    timezone: "Asia/Shanghai"
  action:
    enabled_actions: ["text.send", "state.set", "state.patch"]

# true = all nodes run in-process (development)
# false = nodes run as separate processes, connected via WebSocket
standalone: true

# QQ integration via NapCatQQ (OneBot v11)
# Soul works fine without QQ — just set enabled: false
qq:
  enabled: false
  napcat_ws_url: "ws://127.0.0.1:3001"
  napcat_http_url: "http://127.0.0.1:3000"

# Character persona — edit data/persona.yaml to change Soul's personality
persona:
  file: "data/persona.yaml"
